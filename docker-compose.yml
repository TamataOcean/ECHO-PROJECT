services:
  camera_spawn:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: camera_spawn
    network_mode: host
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./camera_spawn/mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

  echo-project:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echo-project
    network_mode: host
    privileged: true
    env_file: .env
    volumes:
      - ${LOCAL_VIDEO_PATH}:/app/EXPORT_VIDEOS   # stockage vidéo sur l'hôte
      - ./node-red/data:/data                     # flows et config Node-RED persistés
      - /dev:/dev                                  # accès aux périphériques (caméras)
      - ./.env:/app/config.env                    # .env monté pour mise à jour NAS_HOST depuis l'UI
    environment:
      - TZ=${TIMEZONE}
    restart: unless-stopped
