version: '3.8'

services:
  echo-project:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echo-project
    network_mode: host
    privileged: true
    env_file: .env
    volumes:
      - ${LOCAL_VIDEO_PATH}:/app/EXPORT_VIDEOS   # stockage vidéo sur l'hôte
      - ./node-red/data:/data                     # flows et config Node-RED persistés
      - /dev:/dev                                  # accès aux périphériques (caméras)
      - ./.env:/app/config.env                    # .env monté pour mise à jour NAS_HOST depuis l'UI
    environment:
      - TZ=${TIMEZONE}
    restart: unless-stopped
