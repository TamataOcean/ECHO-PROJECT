# mediamtx — configuration pour camera_spawn
# Sert le flux webcam en RTSP sur rtsp://<host>:8554/cam

logLevel: info
logDestinations: [stdout]

# Ports
rtspAddress: :8554
rtmpAddress: :1935
hlsAddress: :8888
webrtcAddress: :8889


paths:
  cam:
    # ffmpeg capture la webcam et publie en RTSP sur ce path
    runOnInit: >-
      ffmpeg
      -f v4l2
      -framerate 25
      -video_size 1280x720
      -i /dev/video0
      -vcodec libx264
      -preset ultrafast
      -tune zerolatency
      -pix_fmt yuv420p
      -f rtsp
      rtsp://localhost:8554/cam
    runOnInitRestart: yes
